<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .active { display: block; }
        .card-soal { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .opsi-container { cursor: pointer; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; transition: 0.3s; }
        .selected { background: #d1e7dd !important; border-color: #0f5132 !important; }
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div id="loginPage" class="page active container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4 class="text-center">Login Siswa</h4>
            <input id="u" class="form-control mb-2" placeholder="Username">
            <input id="p" class="form-control mb-2" type="password" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="login()">MASUK</button>
        </div>
    </div>

    <div id="pilihPage" class="page container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4>Pilih Ujian</h4>
            <select id="pilihKelas" class="form-select mb-2"><option value="7">Kelas 7</option><option value="8">Kelas 8</option></select>
            <select id="pilihMapel" class="form-select mb-2"><option value="IPA">IPA</option><option value="IPS">IPS</option></select>
            <input id="inputToken" class="form-control mb-2" placeholder="Token Ujian">
            <button class="btn btn-success w-100" onclick="mulaiUjian()">MULAI</button>
        </div>
    </div>

    <div id="ujianPage" class="page container mt-4">
        <div class="card-soal">
            <p id="nomer-soal" class="fw-bold"></p>
            <p id="pertanyaanText"></p>
            <div id="opsiBox"></div>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <button class="btn btn-secondary" onclick="navSoal(-1)">Prev</button>
            <button id="btnNext" class="btn btn-primary" onclick="navSoal(1)">Next</button>
            <button id="btnSelesai" class="btn btn-danger" style="display:none;" onclick="konfirmasiSelesai()">SELESAI</button>
        </div>
    </div>

    <script>
        // PENTING: Ganti URL ini dengan URL Web App (Script.google.com) Anda
        const WEB_APP_URL = "https://script.google.com/macros/s/---ID-DEPLOYMENT-ANDA---/exec";
        let currentIdx = 0, bankSoal = [], usernameLogin = "";

        function pindahHalaman(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function login() {
            let u = document.getElementById('u').value, p = document.getElementById('p').value;
            google.script.run.withSuccessHandler(res => {
                if(res.status === "success") { usernameLogin = u; pindahHalaman('pilihPage'); }
                else alert("Login Gagal!");
            }).checkLogin(u, p);
        }

        function mulaiUjian() {
            let k = document.getElementById('pilihKelas').value, m = document.getElementById('pilihMapel').value, t = document.getElementById('inputToken').value;
            google.script.run.withSuccessHandler(res => {
                if(res.status === "error") alert(res.message);
                else { bankSoal = res.data; localStorage.clear(); pindahHalaman('ujianPage'); renderSoal(); }
            }).getSoalWithToken(k, m, t);
        }

        function renderSoal() {
            const soal = bankSoal[currentIdx];
            document.getElementById('nomer-soal').innerText = "Soal No. " + (currentIdx + 1);
            document.getElementById('pertanyaanText').innerText = soal.tanya;
            let img = soal.gambar ? `<img src="${soal.gambar}" class="w-100 mb-3 rounded">` : "";
            let pilihan = JSON.parse(localStorage.getItem("soal_" + soal.id) || "[]");
            let htmlOpsi = ['a', 'b', 'c', 'd'].map(p => 
                `<div class="opsi-container ${pilihan.includes(p)?'selected':''}" onclick="simpanJawaban('${soal.id}', '${p}')">
                    <strong>${p.toUpperCase()}.</strong> ${soal[p]}
                </div>`).join('');
            document.getElementById('opsiBox').innerHTML = img + htmlOpsi;
            document.getElementById('btnNext').style.display = (currentIdx === bankSoal.length - 1) ? "none" : "block";
            document.getElementById('btnSelesai').style.display = (currentIdx === bankSoal.length - 1) ? "block" : "none";
        }

        function simpanJawaban(id, v) {
            let p = JSON.parse(localStorage.getItem("soal_" + id) || "[]");
            if(p.includes(v)) p = p.filter(i => i !== v); else p.push(v);
            localStorage.setItem("soal_" + id, JSON.stringify(p));
            renderSoal();
        }

        function navSoal(step) { if(currentIdx+step >= 0 && currentIdx+step < bankSoal.length) { currentIdx += step; renderSoal(); } }

        function konfirmasiSelesai() {
            if(!confirm("Yakin Selesai?")) return;
            let jawaban = {}; bankSoal.forEach(s => jawaban[s.id] = localStorage.getItem("soal_"+s.id) || "[]");
            google.script.run.withSuccessHandler(msg => { alert(msg); location.reload(); }).handleSubmit({
                username: usernameLogin, kelas: document.getElementById('pilihKelas').value,
                mapel: document.getElementById('pilihMapel').value, jawaban: JSON.stringify(jawaban)
            });
        }
    </script>
</body>
</html>
