<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .opsi-container { cursor: pointer; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
        .selected { background: #d1e7dd; border-color: #0f5132; }
    </style>
</head>
<body class="bg-light">

    <script>const API_URL = "https://script.google.com/macros/s/AKfycbx79KoPf2FJq9VI2ofk5FJLLr2FuLuJMmcII6sbS3UF4Xt9h_Apob63WNIv4prw80N1/exec";</script>

    <div id="loginPage" class="page active container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4>Login Siswa</h4>
            <input id="u" class="form-control mb-2" placeholder="Username">
            <input id="p" class="form-control mb-2" type="password" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="login()">MASUK</button>
        </div>
    </div>

    <script>
        let usernameLogin = "";

        // Fungsi Helper untuk fetch ke Google Apps Script
        async function postData(data) {
            const response = await fetch(API_URL, {
                method: "POST",
                mode: "no-cors", // Penting untuk bypass CORS di GAS
                body: JSON.stringify(data)
            });
            return response;
        }

        function login() {
            let u = document.getElementById('u').value;
            let p = document.getElementById('p').value;
            
            // Contoh pengiriman data ke Apps Script
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ type: "login", username: u, password: p })
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    usernameLogin = u;
                    alert("Berhasil Login!");
                } else {
                    alert("Login Gagal!");
                }
            });
        }

        // --- CHEAT DETECTOR ---
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                alert("Peringatan! Anda keluar dari halaman ujian.");
                fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: "log", username: usernameLogin, pelanggaran: "Keluar Tab" })
                });
            }
        });

        document.addEventListener("copy", (e) => e.preventDefault());
        document.addEventListener("contextmenu", (e) => e.preventDefault());
    </script>
</body>
</html>
