<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; } .active { display: block; }
        .card-soal { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .opsi-container { cursor: pointer; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
        .selected { background: #d1e7dd !important; border-color: #0f5132 !important; }
    </style>
</head>
<body class="bg-light">

    <div id="loginPage" class="page active container mt-5">
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4>Login Siswa</h4>
            <input id="u" class="form-control mb-2" placeholder="Username">
            <input id="p" class="form-control mb-2" type="password" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="login()">MASUK</button>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP ANDA DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/---ID-DEPLOYMENT-ANDA---/exec";
        let usernameLogin = "";

        // FUNGSI LOGIN MENGGUNAKAN FETCH (Wajib untuk GitHub/APK)
       function login() {
    let u = document.getElementById('u').value;
    let p = document.getElementById('p').value;
    
    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "cors", // Pastikan mode cors
        headers: { "Content-Type": "text/plain" }, 
        body: JSON.stringify({ type: "login", username: u, password: p })
    })
    .then(res => res.json())
    .then(data => { /* proses data */ })
    .catch(err => console.log(err));
}
}
